<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    {% include 'header.html' %}

    <main class="page-shell">
        <div class="card result-card">

            <h2>Estimated House Rent</h2>
            <h1 class="price">₹ --</h1>

            <p id="details"></p>
            <p id="locationText"></p>

            <iframe id="mapFrame" width="100%" height="250" class="map-frame"></iframe>

            <button type="button" id="backToHomeBtn">Predict Again</button>

        </div>
    </main>

    {% include 'footer.html' %}

    <script>
        const params = new URLSearchParams(window.location.search);

        const prediction = params.get("prediction");
        const area = params.get("area");
        const beds = params.get("beds");
        const bathrooms = params.get("bathrooms");
        const balconies = params.get("balconies");
        const city = params.get("city");
        const locality = params.get("locality");
        const furnishing = params.get("furnishing");

        // Set price
        document.querySelector(".price").innerText = "₹ " + prediction;

        // Set details
        document.getElementById("details").innerText =
            `${beds} BHK | ${bathrooms} Bath | ${balconies} Balcony | ${area} Sqft | ${furnishing}`;

        // Set location
        document.getElementById("locationText").innerText =
            `Estimated monthly rent in ${city}, ${locality}`;

        // Set map
        document.getElementById("mapFrame").src =
            `https://www.google.com/maps?q=${locality} ${city}&output=embed`;
    </script>

    <script src="{{ url_for('static', filename='main.js') }}"></script>

</body>

</html>
